                title: "[GDPR] GdprMode.Strict — Privacy-by-Default Configuration (Art. 25)",
                labels: ["enhancement", "package/core"],
                body: `## Problem

Teams adopting BLite for GDPR-sensitive applications must manually configure encryption, audit, secure erase, and CDC payload masking. A misconfiguration (e.g. forgetting to enable encryption) silently creates a compliance gap with no warning. GDPR Art. 25 mandates privacy-by-design and privacy-by-default — the system should make compliant configuration the easiest option.

## Appetite

**Small batch — ~1 day** (depends on encryption, audit, and VACUUM issues being complete)

## Solution

**Add \`GdprMode\` enum and integration in \`BLiteEngineOptions\`:**
\`\`\`csharp
public enum GdprMode { None, Strict }

public sealed class BLiteEngineOptions
{
    // ...
    public GdprMode GdprMode { get; init; } = GdprMode.None;
}
\`\`\`

**\`GdprMode.Strict\` enforces the following at engine startup:**

| Setting | Standard default | GdprMode.Strict |
|---------|-----------------|-----------------|
| Encryption | Disabled | **Required** — throws \`InvalidOperationException\` if not configured |
| Audit | Disabled | **Enabled** (FileAuditSink at default path) |
| CDC CapturePayload default | false | false (immutable — cannot be set to true without explicit override) |
| Secure erase on delete | No | **Yes** (slot-level zero-fill) |
| Retention policy for \`[PersonalData]\` collections | Optional | **Warning** logged if absent |

**Implementation:**
- At \`BLiteEngine\` construction: if \`GdprMode.Strict\` and no \`EncryptionOptions\` is configured → throw with a clear message
- Instantiate a default \`FileAuditSink\` at a configurable path (default: next to the \`.db\` file)
- Set \`SecureEraseOnDelete = true\` in the storage engine options
- Check all registered collections with \`[PersonalData]\` fields for missing retention policies; emit a structured log warning for each

## Rabbit Holes

- \`GdprMode.Strict\` must not silently enable features that have a performance cost without documenting them — each enabled feature should log a startup informational message.
- The \`CapturePayload\` immutability in strict mode must be enforced at the \`WatchOptions\` validation layer, not just at construction time.

## No-gos

- \`GdprMode.Strict\` does not automatically delete existing unencrypted data — it only enforces configuration going forward.
- \`GdprMode.Strict\` does not provide a legal guarantee of GDPR compliance — it is a technical safeguard layer.`,
